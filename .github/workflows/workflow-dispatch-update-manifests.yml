name: Dispatch update manifests

on:
  workflow_call:
    inputs:
      image_tag:
        description: "Image tag to set (e.g., 1.2.3-abc1234)"
        required: true
        type: string
      environment:
        description: "Target environment (yt01, tt02, at23, prod)"
        required: true
        type: string
    secrets:
      MANIFEST_APP_ID:
        required: true
      MANIFEST_APP_PRIVATE_KEY:
        required: true

jobs:
  dispatch:
    name: Dispatch to dialogporten-manifests
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.MANIFEST_APP_ID }}
          private-key: ${{ secrets.MANIFEST_APP_PRIVATE_KEY }}
          owner: altinn
          repositories: dialogporten-manifests

      - name: Dispatch repository event
        uses: peter-evans/repository-dispatch@28959ce8df70de7be546dd1250a005dd32156697 # v4.0.1
        with:
          token: ${{ steps.app-token.outputs.token }}
          repository: altinn/dialogporten-manifests
          event-type: update_all_image_tags
          client-payload: '{"image_tag": "${{ inputs.image_tag }}", "environment": "${{ inputs.environment }}"}'
