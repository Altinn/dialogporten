name: CI/CD Main

on:
  workflow_dispatch:
  push:
    branches: [ main ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref_name }}

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: write
  id-token: write

jobs:
  generate-git-short-sha:
    name: Generate git short sha
    uses: ./.github/workflows/workflow-generate-git-short-sha.yml

  get-current-version:
    name: Get current version
    uses: ./.github/workflows/workflow-get-current-version.yml

  check-for-changes:
    name: Check for changes
    uses: ./.github/workflows/workflow-check-for-changes.yml

  build-and-test:
    name: Build and test backend
    uses: ./.github/workflows/workflow-build-and-test.yml
    needs: [ check-for-changes ]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true' || needs.check-for-changes.outputs.hasTestChanges == 'true' }}

  publish-docker-images:
    name: Build and publish docker images
    uses: ./.github/workflows/workflow-publish-docker-images.yml
    needs:
      [
        get-current-version,
        check-for-changes,
        generate-git-short-sha,
        build-and-test,
      ]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true' }}
    secrets:
      GCR_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
    with:
      dockerImageBaseName: ghcr.io/altinn/dialogporten-
      version: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}

  update-manifests:
    name: Update manifest image tags for at23
    needs: [get-current-version, generate-git-short-sha, publish-docker-images, check-for-changes]
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true') }}
    uses: ./.github/workflows/workflow-dispatch-update-manifests.yml
    with:
      environment: at23
      image_tag: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}
    secrets:
      MANIFESTS_PAT: ${{ secrets.MANIFESTS_PAT }}

  deploy-infra:
    name: Deploy infra to test
    needs: [ get-current-version, check-for-changes, generate-git-short-sha ]
    if: ${{ github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasInfraChanges == 'true' }}
    uses: ./.github/workflows/workflow-deploy-infra.yml
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      AZURE_SOURCE_KEY_VAULT_NAME: ${{ secrets.AZURE_SOURCE_KEY_VAULT_NAME }}
      AZURE_SOURCE_KEY_VAULT_SUBSCRIPTION_ID: ${{ secrets.AZURE_SOURCE_KEY_VAULT_SUBSCRIPTION_ID }}
      AZURE_SOURCE_KEY_VAULT_RESOURCE_GROUP: ${{ secrets.AZURE_SOURCE_KEY_VAULT_RESOURCE_GROUP }}
      AZURE_SOURCE_KEY_VAULT_SSH_JUMPER_SSH_PUBLIC_KEY: ${{ secrets.AZURE_SOURCE_KEY_VAULT_SSH_JUMPER_SSH_PUBLIC_KEY }}
    with:
      environment: test
      region: norwayeast
      version: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}

  deploy-apps:
    name: Deploy apps to test
    needs:
      [
        get-current-version,
        check-for-changes,
        generate-git-short-sha,
        publish-docker-images,
        deploy-infra,
      ]
    # we want deployment of apps to be dependent on deployment of infrastructure, but if infrastructure is skipped, we still want to deploy the apps
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true') }}
    uses: ./.github/workflows/workflow-deploy-apps.yml
    secrets:
      AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # todo: consider resolving these in another way since they are created in the infra-step
      AZURE_RESOURCE_GROUP_NAME: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}
      AZURE_ENVIRONMENT_KEY_VAULT_NAME: ${{ secrets.AZURE_ENVIRONMENT_KEY_VAULT_NAME }}
      AZURE_CONTAINER_APP_ENVIRONMENT_NAME: ${{ secrets.AZURE_CONTAINER_APP_ENVIRONMENT_NAME }}
      AZURE_APP_INSIGHTS_CONNECTION_STRING: ${{ secrets.AZURE_APP_INSIGHTS_CONNECTION_STRING }}
      AZURE_APP_CONFIGURATION_NAME: ${{ secrets.AZURE_APP_CONFIGURATION_NAME }}
      AZURE_SERVICE_BUS_NAMESPACE_NAME: ${{ secrets.AZURE_SERVICE_BUS_NAMESPACE_NAME }}
    with:
      environment: test
      version: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}
      runMigration: true

  get-previous-deployed-sha:
    name: Get previous deployed SHA for test
    runs-on: ubuntu-latest
    environment: test
    if: ${{ github.event_name == 'push' }}
    outputs:
      sha: ${{ steps.resolve.outputs.sha }}
    steps:
      - name: Resolve watermark
        id: resolve
        env:
          STORED_SHA: ${{ vars.LATEST_DEPLOYED_SHA }}
          FALLBACK_SHA: ${{ github.event.before }}
        run: |
          if [[ -n "$STORED_SHA" ]]; then
            echo "Using stored watermark: $STORED_SHA"
            echo "sha=$STORED_SHA" >> "$GITHUB_OUTPUT"
          else
            echo "No stored watermark; falling back to github.event.before: $FALLBACK_SHA"
            echo "sha=$FALLBACK_SHA" >> "$GITHUB_OUTPUT"
          fi

  tag-issues-with-environment:
    name: Tag deployed PRs and issues for test
    needs: [ deploy-apps, deploy-infra, get-previous-deployed-sha ]
    if: ${{ always() && !failure() && !cancelled() && github.event_name == 'push' && (needs.deploy-apps.outputs.deployment_executed == 'true' || needs.deploy-infra.outputs.deployment_executed == 'true') }}
    uses: ./.github/workflows/workflow-tag-issues-with-environment.yml
    with:
      environment-label: at23
      from-sha: ${{ needs.get-previous-deployed-sha.outputs.sha }}
      to-sha: ${{ github.sha }}

  store-latest-deployed-sha:
    name: Store latest deployed SHA for test
    needs: [ tag-issues-with-environment ]
    if: ${{ always() && !failure() && !cancelled() && needs.tag-issues-with-environment.result == 'success' }}
    uses: ./.github/workflows/workflow-store-github-env-variable.yml
    with:
      variable_name: LATEST_DEPLOYED_SHA
      variable_value: ${{ github.sha }}
      environment: test
    secrets:
      GH_TOKEN: ${{ secrets.RELEASE_VERSION_STORAGE_PAT }}

  generate-timestamp:
    name: Generate timestamp
    runs-on: ubuntu-latest
    outputs:
      timestamp: ${{ steps.get-timestamp.outputs.timestamp }}
    steps:
      - name: Get timestamp
        id: get-timestamp
        run: echo "timestamp=$(date +%s)" >> $GITHUB_OUTPUT

  publish-sdk-to-nuget:
    uses: ./.github/workflows/workflow-publish-nuget.yml
    needs: [ deploy-apps, get-current-version, generate-git-short-sha, check-for-changes, generate-timestamp ]
    if: ${{ always() && !failure() && !cancelled() && ( needs.check-for-changes.outputs.hasSwaggerSchemaChanges == 'true' || needs.check-for-changes.outputs.hasWebApiClientChanges == 'true' ) }}
    with:
      version: ${{ needs.get-current-version.outputs.version }}-alpha.${{ needs.generate-timestamp.outputs.timestamp }}+${{ needs.generate-git-short-sha.outputs.gitShortSha }}
      path: 'src/WebApiClient/Digdir.Library.Dialogporten.WebApiClient/Digdir.Library.Dialogporten.WebApiClient.csproj'
      source: 'https://api.nuget.org/v3/index.json'
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-enduser-sdk-to-nuget:
    uses: ./.github/workflows/workflow-publish-nuget.yml
    needs: [ deploy-apps, get-current-version, generate-git-short-sha, check-for-changes, generate-timestamp ]
    if: ${{ always() && !failure() && !cancelled() && ( needs.check-for-changes.outputs.hasOpenApiEndUserSchemaChanges == 'true' || needs.check-for-changes.outputs.hasWebApiEndUserClientChanges == 'true' ) }}
    with:
      version: ${{ needs.get-current-version.outputs.version }}-alpha.${{ needs.generate-timestamp.outputs.timestamp }}+${{ needs.generate-git-short-sha.outputs.gitShortSha }}
      path: 'src/WebApiClient/Digdir.Library.Dialogporten.WebApiClient.EndUser/Digdir.Library.Dialogporten.WebApiClient.EndUser.csproj'
      source: 'https://api.nuget.org/v3/index.json'
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-serviceowner-sdk-to-nuget:
    uses: ./.github/workflows/workflow-publish-nuget.yml
    needs: [ deploy-apps, get-current-version, generate-git-short-sha, check-for-changes, generate-timestamp ]
    if: ${{ always() && !failure() && !cancelled() && ( needs.check-for-changes.outputs.hasOpenApiServiceOwnerSchemaChanges == 'true' || needs.check-for-changes.outputs.hasWebApiServiceOwnerClientChanges == 'true' ) }}
    with:
      version: ${{ needs.get-current-version.outputs.version }}-alpha.${{ needs.generate-timestamp.outputs.timestamp }}+${{ needs.generate-git-short-sha.outputs.gitShortSha }}
      path: 'src/WebApiClient/Digdir.Library.Dialogporten.WebApiClient.ServiceOwner/Digdir.Library.Dialogporten.WebApiClient.ServiceOwner.csproj'
      source: 'https://api.nuget.org/v3/index.json'
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  publish-schema-npm:
    name: Deploy schema npm package
    needs: [ check-for-changes, get-current-version, generate-git-short-sha, deploy-apps ]
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasSwaggerSchemaChanges == 'true' || needs.check-for-changes.outputs.hasOpenApiEndUserSchemaChanges == 'true' || needs.check-for-changes.outputs.hasOpenApiServiceOwnerSchemaChanges == 'true' || needs.check-for-changes.outputs.hasGqlSchemaChanges == 'true') }}
    uses: ./.github/workflows/workflow-publish-schema.yml
    with:
      version: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}
    secrets:
      NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

  run-e2e-tests:
    name: "Run K6 functional end-to-end tests"
    # we want the end-to-end tests to be dependent on deployment of infrastructure and apps, but if infrastructure is skipped, we still want to run the tests
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true' || needs.check-for-changes.outputs.hasTestChanges == 'true') }}
    needs: [ deploy-apps, check-for-changes ]
    uses: ./.github/workflows/workflow-run-k6-tests.yml
    secrets:
      TOKEN_GENERATOR_USERNAME: ${{ secrets.TOKEN_GENERATOR_USERNAME }}
      TOKEN_GENERATOR_PASSWORD: ${{ secrets.TOKEN_GENERATOR_PASSWORD }}
    with:
      environment: test
      apiVersion: v1
      testSuitePath: tests/k6/suites/all-single-pass.js
    permissions:
      checks: write
      pull-requests: write

  run-graphql-e2e-tests:
    name: "Run GraphQL E2E tests"
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true' || needs.check-for-changes.outputs.hasTestChanges == 'true') }}
    needs: [ run-e2e-tests, check-for-changes ]
    uses: ./.github/workflows/workflow-run-graphql-e2e-tests.yml
    secrets:
      TOKEN_GENERATOR_USERNAME: ${{ secrets.TOKEN_GENERATOR_USERNAME }}
      TOKEN_GENERATOR_PASSWORD: ${{ secrets.TOKEN_GENERATOR_PASSWORD }}
    with:
      environment: test

  run-webapi-e2e-tests:
    name: "Run WebAPI E2E tests"
    if: ${{ always() && !failure() && !cancelled() && (github.event_name == 'workflow_dispatch' || needs.check-for-changes.outputs.hasBackendChanges == 'true' || needs.check-for-changes.outputs.hasTestChanges == 'true') }}
    needs: [ run-e2e-tests, check-for-changes ]
    uses: ./.github/workflows/workflow-run-webapi-e2e-tests.yml
    secrets:
      TOKEN_GENERATOR_USERNAME: ${{ secrets.TOKEN_GENERATOR_USERNAME }}
      TOKEN_GENERATOR_PASSWORD: ${{ secrets.TOKEN_GENERATOR_PASSWORD }}
    with:
      environment: test

  send-slack-message-on-failure:
    name: Send Slack message on failure
    needs: [
      deploy-infra,
      deploy-apps,
      get-previous-deployed-sha,
      tag-issues-with-environment,
      store-latest-deployed-sha,
      run-e2e-tests,
      run-graphql-e2e-tests,
      run-webapi-e2e-tests,
      publish-schema-npm,
      publish-docker-images,
      build-and-test,
    ]
    if: ${{ always() && failure() && !cancelled() }}
    uses: ./.github/workflows/workflow-send-ci-cd-status-slack-message.yml
    with:
      environment: test
      infra_status: ${{ needs.deploy-infra.result }}
      apps_status: ${{ needs.deploy-apps.result }}
      e2e_tests_status: ${{ needs.run-e2e-tests.result }}
      graphql_e2e_tests_status: ${{ needs.run-graphql-e2e-tests.result }}
      webapi_e2e_tests_status: ${{ needs.run-webapi-e2e-tests.result }}
      schema_npm_status: ${{ needs.publish-schema-npm.result }}
      publish_status: ${{ needs.publish-docker-images.result }}
      build_and_test_status: ${{ needs.build-and-test.result }}
    secrets:
      SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
      SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID_FOR_CI_CD_STATUS }}

  send-deployment-to-swarmia:
    name: Send deployment to Swarmia
    if: ${{ always() && !failure() && !cancelled() }}
    uses: ./.github/workflows/workflow-swarmia-deployment.yml
    needs: [ deploy-infra, deploy-apps, get-current-version, generate-git-short-sha ]
    with:
      app-name: dialogporten
      environment: 'test'
      version: ${{ needs.get-current-version.outputs.version }}-${{ needs.generate-git-short-sha.outputs.gitShortSha }}
    secrets:
      token: ${{ secrets.SWARMIA_DEPLOYMENTS_AUTHORIZATION }}
