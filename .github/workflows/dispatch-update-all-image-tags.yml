name: Dispatch - Update all image tags

on:
  push:
    branches: [arealmaas/repo-dispatch-image-tags]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - yt01
          - tt02
          - at23
          - prod
      image_tag:
        description: "Image tag to set (e.g., 1.2.3-abc1234)"
        required: true
        type: string

permissions:
  contents: read
  packages: read

jobs:
  dispatch:
    uses: ./.github/workflows/workflow-dispatch-update-manifests.yml
    with:
      environment: ${{ inputs.environment || 'at23' }}
      image_tag: ${{ inputs.image_tag || '1.114.3' }}
    secrets:
      MANIFESTS_PAT: ${{ secrets.MANIFESTS_PAT }}
