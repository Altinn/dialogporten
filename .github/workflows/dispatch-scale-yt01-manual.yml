name: Scale YT01 Manual

on:
  workflow_dispatch:
    inputs:
      state:
        description: "Scale state"
        required: true
        type: choice
        options:
          - 'on'
          - 'off'
      deploy:
        description: "Deploy latest version when scaling on (checks if newer version is available)"
        required: false
        type: boolean
        default: true
      postpone_until:
        description: "Postpone scheduled shutdown until this datetime (ISO 8601, e.g. 2026-03-01T20:00:00+01:00). Only used with 'on'."
        required: false
        type: string

run-name: Scale YT01 ${{ inputs.state }}

jobs:
  scale:
    runs-on: ubuntu-latest
    environment: yt01
    permissions:
      id-token: write
      contents: read
    steps:
      - name: "Checkout GitHub Action"
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Azure Login
        uses: ./.github/actions/azure-login
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get PostgreSQL server name
        id: pg
        shell: bash
        run: |
          set -euo pipefail

          # Target the canonical postgres2 database (PG18/SSDv2)
          POSTGRES_NAME=$(az postgres flexible-server list \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?contains(name, 'dp-be-yt01-postgres2-')].name" \
            -o tsv)

          if [[ -z "$POSTGRES_NAME" ]]; then
            echo "Error: No PostgreSQL server matching 'dp-be-yt01-postgres2-' found."
            exit 1
          fi

          echo "Found PostgreSQL server: $POSTGRES_NAME"
          echo "name=$POSTGRES_NAME" >> "$GITHUB_OUTPUT"
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Install containerapp CLI extension
        run: az extension add --name containerapp --upgrade

      # === SCALE ON ===
      - name: Scale workload profile up
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          CURRENT_MIN=$(az containerapp env workload-profile show \
            --name "dp-be-yt01-cae" \
            --resource-group "$RESOURCE_GROUP" \
            --workload-profile-name "Dedicated-D8" \
            --query "properties.minimumCount" -o tsv)

          if [[ "$CURRENT_MIN" -ne 3 ]]; then
            echo "Scaling workload profile up (current min-nodes: $CURRENT_MIN -> 3)..."
            az containerapp env workload-profile update \
              --name "dp-be-yt01-cae" \
              --resource-group "$RESOURCE_GROUP" \
              --workload-profile-name "Dedicated-D8" \
              --min-nodes 3 \
              --max-nodes 10
          else
            echo "Workload profile Dedicated-D8 already at min-nodes=3. Skipping."
          fi
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Start PostgreSQL
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          STATE=$(az postgres flexible-server show \
            --name "${{ steps.pg.outputs.name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --query "state" -o tsv)

          if [[ "$STATE" != "Ready" ]]; then
            echo "Starting PostgreSQL server: ${{ steps.pg.outputs.name }}"
            az postgres flexible-server start \
              --name "${{ steps.pg.outputs.name }}" \
              --resource-group "$RESOURCE_GROUP"
          else
            echo "PostgreSQL server ${{ steps.pg.outputs.name }} is already running."
          fi
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Activate revisions for all apps
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          APPS=(
            "dp-be-yt01-webapi-eu-ca"
            "dp-be-yt01-webapi-so-ca"
            "dp-be-yt01-graphql-ca"
            "dp-be-yt01-service"
          )

          activate_app() {
            local APP=$1
            local REVISION
            REVISION=$(az containerapp show \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.latestRevisionName" -o tsv)

            local STATUS
            STATUS=$(az containerapp revision show \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              --revision "$REVISION" \
              --query "properties.active" -o tsv)

            if [[ "${STATUS,,}" != "true" ]]; then
              echo "Activating revision $REVISION for $APP..."
              az containerapp revision activate \
                --name "$APP" \
                --resource-group "$RESOURCE_GROUP" \
                --revision "$REVISION"
            else
              echo "$APP revision $REVISION is already active. Skipping."
            fi
          }

          PIDS=()
          for APP in "${APPS[@]}"; do
            activate_app "$APP" &
            PIDS+=($!)
          done
          for PID in "${PIDS[@]}"; do
            wait "$PID"
          done
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Resume scheduled Container App Jobs
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          TAG_KEY="scaleOffOriginalCron"

          mapfile -t JOBS < <(az containerapp job list \
            -g "$RESOURCE_GROUP" \
            --query "[?properties.configuration.triggerType=='Schedule'].name" \
            -o tsv)

          if [[ ${#JOBS[@]} -eq 0 ]]; then
            echo "No scheduled Container App Jobs found."
            exit 0
          fi

          for JOB in "${JOBS[@]}"; do
            SAVED_CRON=$(az containerapp job show \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --query "tags.\"${TAG_KEY}\"" -o tsv 2>/dev/null || true)

            if [[ -z "$SAVED_CRON" || "$SAVED_CRON" == "None" ]]; then
              echo "[$JOB] skipped: no saved cron tag"
              continue
            fi

            CURRENT_CRON=$(az containerapp job show \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --query "properties.configuration.scheduleTriggerConfig.cronExpression" \
              -o tsv)

            if [[ "$CURRENT_CRON" == "$SAVED_CRON" ]]; then
              echo "[$JOB] already running with correct cron ($CURRENT_CRON). Skipping."
              continue
            fi

            az containerapp job update \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --cron-expression "$SAVED_CRON" --only-show-errors >/dev/null
            echo "[$JOB] resumed (cron=$SAVED_CRON)"
          done
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Enable public network access for container app environment
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          CURRENT=$(az containerapp env show \
            --name "dp-be-yt01-cae" \
            --resource-group "$RESOURCE_GROUP" \
            --query "properties.publicNetworkAccess" -o tsv)

          if [[ "${CURRENT,,}" != "enabled" ]]; then
            echo "Enabling public network access (currently: $CURRENT)..."
            az containerapp env update \
              --name "dp-be-yt01-cae" \
              --resource-group "$RESOURCE_GROUP" \
              --public-network-access Enabled
          else
            echo "Public network access is already enabled. Skipping."
          fi
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Enable availability test
        if: inputs.state == 'on'
        shell: bash
        run: |
          set -euo pipefail

          CURRENT=$(az monitor app-insights web-test show \
            --name "dp-be-yt01-dialogporten-health-test" \
            --resource-group "$RESOURCE_GROUP" \
            --query "enabled" -o tsv)

          if [[ "${CURRENT,,}" != "true" ]]; then
            echo "Enabling availability test (currently: $CURRENT)..."
            az monitor app-insights web-test update \
              --name "dp-be-yt01-dialogporten-health-test" \
              --resource-group "$RESOURCE_GROUP" \
              --enabled true
          else
            echo "Availability test is already enabled. Skipping."
          fi
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Deploy latest version
        if: inputs.state == 'on' && inputs.deploy == true
        env:
          GH_TOKEN: ${{ secrets.RELEASE_VERSION_STORAGE_PAT }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          LATEST_VERSION=$(gh release view --repo "$REPOSITORY" --json tagName -q '.tagName' | sed 's/^v//')
          echo "Latest release version: $LATEST_VERSION"

          DEPLOYED_VERSION=$(gh variable get LATEST_DEPLOYED_APPS_VERSION \
            --env yt01 \
            --repo "$REPOSITORY" 2>/dev/null || echo "")
          echo "Currently deployed version: ${DEPLOYED_VERSION:-unknown}"

          if [[ "$LATEST_VERSION" != "$DEPLOYED_VERSION" ]]; then
            echo "Newer version available. Triggering deploy of $LATEST_VERSION..."
            gh workflow run ci-cd-yt01.yml \
              --repo "$REPOSITORY" \
              -f version="$LATEST_VERSION"
          else
            echo "Already on latest version ($DEPLOYED_VERSION). Skipping deploy."
          fi

      # === SCALE OFF ===
      - name: Disable availability test
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          az monitor app-insights web-test update \
            --name "dp-be-yt01-dialogporten-health-test" \
            --resource-group "$RESOURCE_GROUP" \
            --enabled false
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Disable public network access for container app environment
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          az containerapp env update \
            --name "dp-be-yt01-cae" \
            --resource-group "$RESOURCE_GROUP" \
            --public-network-access Disabled
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Deactivate revisions for all apps
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          APPS=(
            "dp-be-yt01-webapi-eu-ca"
            "dp-be-yt01-webapi-so-ca"
            "dp-be-yt01-graphql-ca"
            "dp-be-yt01-service"
          )

          deactivate_app() {
            local APP=$1
            local REVISION
            REVISION=$(az containerapp show \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              --query "properties.latestRevisionName" -o tsv)

            local STATUS
            STATUS=$(az containerapp revision show \
              --name "$APP" \
              --resource-group "$RESOURCE_GROUP" \
              --revision "$REVISION" \
              --query "properties.active" -o tsv)

            if [[ "${STATUS,,}" != "false" ]]; then
              echo "Deactivating revision $REVISION for $APP..."
              az containerapp revision deactivate \
                --name "$APP" \
                --resource-group "$RESOURCE_GROUP" \
                --revision "$REVISION"
            else
              echo "$APP revision $REVISION is already inactive. Skipping."
            fi
          }

          PIDS=()
          for APP in "${APPS[@]}"; do
            deactivate_app "$APP" &
            PIDS+=($!)
          done
          for PID in "${PIDS[@]}"; do
            wait "$PID"
          done
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Pause scheduled Container App Jobs
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          TAG_KEY="scaleOffOriginalCron"
          PAUSE_CRON="0 0 1 1 *"

          mapfile -t JOBS < <(az containerapp job list \
            -g "$RESOURCE_GROUP" \
            --query "[?properties.configuration.triggerType=='Schedule'].name" \
            -o tsv)

          if [[ ${#JOBS[@]} -eq 0 ]]; then
            echo "No scheduled Container App Jobs found."
            exit 0
          fi

          for JOB in "${JOBS[@]}"; do
            CURRENT_CRON=$(az containerapp job show \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --query "properties.configuration.scheduleTriggerConfig.cronExpression" \
              -o tsv)

            if [[ -z "$CURRENT_CRON" || "$CURRENT_CRON" == "None" ]]; then
              echo "[$JOB] skipped: empty cron expression"
              continue
            fi

            SAVED_CRON=$(az containerapp job show \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --query "tags.\"${TAG_KEY}\"" -o tsv 2>/dev/null || true)

            if [[ -z "$SAVED_CRON" || "$SAVED_CRON" == "None" ]]; then
              JOB_ID=$(az containerapp job show -g "$RESOURCE_GROUP" -n "$JOB" --query id -o tsv)
              az tag update --resource-id "$JOB_ID" \
                --operation Merge --tags "${TAG_KEY}=${CURRENT_CRON}" \
                --only-show-errors >/dev/null
            fi

            az containerapp job update \
              -g "$RESOURCE_GROUP" -n "$JOB" \
              --cron-expression "$PAUSE_CRON" --only-show-errors >/dev/null
            az containerapp job stop \
              -g "$RESOURCE_GROUP" -n "$JOB" --only-show-errors >/dev/null || true
            echo "[$JOB] paused (cron=$CURRENT_CRON -> $PAUSE_CRON)"
          done
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Scale workload profile down
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          az containerapp env workload-profile update \
            --name "dp-be-yt01-cae" \
            --resource-group "$RESOURCE_GROUP" \
            --workload-profile-name "Dedicated-D8" \
            --min-nodes 0 \
            --max-nodes 10
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      - name: Stop PostgreSQL
        if: inputs.state == 'off'
        shell: bash
        run: |
          set -euo pipefail

          STATE=$(az postgres flexible-server show \
            --name "${{ steps.pg.outputs.name }}" \
            --resource-group "$RESOURCE_GROUP" \
            --query "state" -o tsv)

          if [[ "$STATE" == "Ready" ]]; then
            echo "Stopping PostgreSQL server: ${{ steps.pg.outputs.name }}"
            az postgres flexible-server stop \
              --name "${{ steps.pg.outputs.name }}" \
              --resource-group "$RESOURCE_GROUP"
          else
            echo "PostgreSQL server ${{ steps.pg.outputs.name }} is already in state: $STATE. Skipping stop."
          fi
        env:
          RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP_NAME }}

      # === POSTPONE HANDLING ===
      - name: Handle postpone variable
        if: inputs.postpone_until != '' && inputs.state == 'on'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_VERSION_STORAGE_PAT }}
          REPOSITORY: ${{ github.repository }}
          POSTPONE_UNTIL: ${{ inputs.postpone_until }}
        shell: bash
        run: |
          set -euo pipefail

          # Validate the date is in the future
          POSTPONE_TS=$(date -d "$POSTPONE_UNTIL" +%s 2>/dev/null || echo "0")
          NOW_TS=$(date +%s)

          if [[ "$POSTPONE_TS" -gt "$NOW_TS" ]]; then
            gh variable set YT01_DB_SHUTDOWN_POSTPONE_UNTIL \
              --body "$POSTPONE_UNTIL" \
              --env yt01 \
              --repo "$REPOSITORY"
            echo "Shutdown postponed until $POSTPONE_UNTIL"
          else
            echo "Warning: Postpone date is in the past. Clearing any existing postpone."
            gh variable delete YT01_DB_SHUTDOWN_POSTPONE_UNTIL \
              --env yt01 \
              --repo "$REPOSITORY" || true
          fi

      - name: Warn and clear postpone on scale-off
        if: inputs.postpone_until != '' && inputs.state == 'off'
        env:
          GH_TOKEN: ${{ secrets.RELEASE_VERSION_STORAGE_PAT }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          echo "Warning: postpone_until was provided with state 'off'. Ignoring and clearing any existing postpone."
          gh variable delete YT01_DB_SHUTDOWN_POSTPONE_UNTIL \
            --env yt01 \
            --repo "$REPOSITORY" || true

      - name: Clear stale postpone variable
        if: inputs.postpone_until == ''
        env:
          GH_TOKEN: ${{ secrets.RELEASE_VERSION_STORAGE_PAT }}
          REPOSITORY: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail

          # Clean up any past-dated postpone variable
          POSTPONE_UNTIL=$(gh variable get YT01_DB_SHUTDOWN_POSTPONE_UNTIL \
            --env yt01 \
            --repo "$REPOSITORY" 2>/dev/null || echo "")

          if [[ -n "$POSTPONE_UNTIL" ]]; then
            POSTPONE_TS=$(date -d "$POSTPONE_UNTIL" +%s 2>/dev/null || echo "0")
            NOW_TS=$(date +%s)

            if [[ "$POSTPONE_TS" -le "$NOW_TS" ]]; then
              echo "Postpone date $POSTPONE_UNTIL is in the past. Clearing variable."
              gh variable delete YT01_DB_SHUTDOWN_POSTPONE_UNTIL \
                --env yt01 \
                --repo "$REPOSITORY" || true
            fi
          fi

      - name: Logout from Azure
        if: ${{ always() }}
        run: az logout
